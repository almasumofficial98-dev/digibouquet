{% extends "base.html" %}
{% block content %}

<h1>Create Your Digital Bouquet</h1>
<p class="subtitle">Pick up to 10 flowers</p>

<form method="POST" action="/create">
    <div class="flower-picker">
        {% for i in range(1, 12) %}
        <div class="flower-option" id="opt-f{{i}}" onclick="addFlower('f{{i}}')">
            <img src="{{ url_for('static', filename='images/f' ~ i ~ '.png') }}" alt="Flower {{i}}">
            <div class="badge hidden" id="badge-f{{i}}">×1</div>
        </div>
        {% endfor %}
    </div>

    <p id="count" class="counter">0 / 10 selected</p>

    <textarea name="message" placeholder="Write a special message to accompany your bouquet..."></textarea>

    <div id="hiddenFlowers"></div>

    <button type="submit" id="submitBtn" disabled>Create Bouquet</button>
</form>

<script>
let selected = [];

function addFlower(f) {
    if (selected.length >= 10) {
        alert("You can only pick up to 10 flowers!");
        return;
    }
    selected.push(f);
    renderHidden();
}

function renderHidden() {
    document.getElementById("count").innerText = `${selected.length} / 10 selected`;
    document.getElementById("submitBtn").disabled = selected.length === 0;

    // Reset badges
    document.querySelectorAll(".badge").forEach(b => {
        b.classList.add("hidden");
        b.innerText = "";
    });

    // Count quantities
    const counts = {};
    selected.forEach(f => counts[f] = (counts[f] || 0) + 1);

    Object.keys(counts).forEach(f => {
        const badge = document.getElementById(`badge-${f}`);
        badge.innerText = `×${counts[f]}`;
        badge.classList.remove("hidden");
        document.getElementById(`opt-${f}`).classList.add("selected");
    });

    // Hidden inputs
    const container = document.getElementById("hiddenFlowers");
    container.innerHTML = "";
    selected.forEach(f => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "flowers[]";
        input.value = f;
        container.appendChild(input);
    });
}
</script>

{% endblock %}
