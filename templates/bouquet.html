{% extends "base.html" %}
{% block content %}

<h1>Your Bouquet</h1>

<div class="bouquet-stage">
  <img src="/static/images/leaves.png" class="leaves">

  {% for f in flowers %}
    <img src="/static/images/f{{ f }}.png" class="flower">
  {% endfor %}
</div>

<p class="message">{{ message }}</p>

{% endblock %}
